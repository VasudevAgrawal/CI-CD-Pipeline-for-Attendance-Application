```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Attendance App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      text-align: center;
      padding: 50px;
    }
    h1 {
      color: #333;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input {
      padding: 10px;
      width: 90%;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      background: #e9ecef;
      margin: 5px;
      padding: 8px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <h1>📋 Attendance Application</h1>

  <div class="container">
    <input type="text" id="name" placeholder="Enter Student Name">
    <button onclick="markAttendance()">Mark Present</button>

    <h3>Present Students</h3>
    <ul id="list"></ul>
  </div>

  <script>
    function markAttendance() {
      const name = document.getElementById("name").value;
      if (name === "") {
        alert("Please enter a name");
        return;
      }

      const list = document.getElementById("list");
      const li = document.createElement("li");
      li.textContent = name;

      list.appendChild(li);
      document.getElementById("name").value = "";
    }
  </script>

</body>
</html>
```
